<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — DKS & RKJI</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary: #2563EB;
            --primary-dark: #1D4ED8;
            --secondary: #7C3AED;
            --accent: #F59E0B;
            --bg: #F1F5F9;
            --card-bg: #FFFFFF;
            --text: #1E293B;
            --text-light: #64748B;
            --border: #E2E8F0;
            --success: #10B981;
            --danger: #EF4444;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.12);
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Noto Sans Devanagari', sans-serif;
            background: linear-gradient(135deg, #EFF6FF 0%, #F5F3FF 50%, #FEF3C7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Background decorative blobs */
        body::before {
            content: '';
            position: fixed;
            top: -250px;
            right: -250px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(37,99,235,0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -200px;
            left: -200px;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(124,58,237,0.07) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        /* Main Container */
        .main-container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ==================== NAVBAR ==================== */
        .navbar {
            grid-column: 1 / -1;
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text);
            font-weight: 500;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 8px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .nav-links a:hover {
            background: #EFF6FF;
            color: var(--primary);
        }

        .nav-links a i {
            font-size: 13px;
            color: var(--primary);
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg);
            border-radius: 10px;
            padding: 4px;
            border: 1px solid var(--border);
            transition: var(--transition);
        }

        .search-box:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }

        .search-box input[type="search"] {
            border: none;
            background: transparent;
            padding: 8px 12px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            width: 160px;
        }

        .search-box button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 7px;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
            font-family: inherit;
            transition: var(--transition);
        }

        .search-box button:hover {
            background: var(--primary-dark);
        }

        /* ==================== LEFT CARD - LOGIN ==================== */
        .login-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 40px 36px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .login-header {
            text-align: center;
        }

        .login-header .icon-circle {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            color: white;
            font-size: 24px;
            box-shadow: 0 8px 24px rgba(37,99,235,0.25);
        }

        .login-header h2 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
        }

        .login-header p {
            font-size: 13px;
            color: var(--text-light);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            color: var(--text-light);
            font-size: 15px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            transition: var(--transition);
            background: var(--bg);
            color: var(--text);
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.08);
            background: white;
        }

        .login-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: var(--transition);
            box-shadow: 0 4px 16px rgba(37,99,235,0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(37,99,235,0.35);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .social-login {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .social-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            font-size: 18px;
            color: var(--text);
        }

        .social-btn:hover {
            border-color: var(--primary);
            background: #EFF6FF;
            color: var(--primary);
        }

        /* ==================== RIGHT CARD - INFO ==================== */
        .info-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 36px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 20px;
        }

        .info-notice {
            background: linear-gradient(135deg, #FEF3C7, #FDE68A);
            color: #92400E;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(245,158,11,0.4); }
            50% { box-shadow: 0 0 0 12px rgba(245,158,11,0); }
        }

        .dev-section {
            display: flex;
            gap: 30px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .dev-profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .dev-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 22px;
            color: white;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            transition: var(--transition);
        }

        .dev-avatar:hover {
            transform: scale(1.05);
        }

        .dev-avatar.rk {
            background: linear-gradient(135deg, #96C2DB, #60A5FA);
        }

        .dev-avatar.dks {
            background: linear-gradient(135deg, #DDD0CF, #F472B6);
            color: #1E293B;
        }

        .dev-name {
            font-weight: 600;
            font-size: 15px;
            color: var(--text);
        }

        .dev-role {
            font-size: 12px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .welcome-text {
            font-size: 16px;
            color: var(--text);
            font-weight: 500;
            font-style: italic;
            line-height: 1.7;
        }

        .welcome-text .highlight {
            color: var(--secondary);
            font-weight: 700;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #DCFCE7;
            color: #166534;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
        }

        .badge i {
            color: var(--success);
        }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 768px) {
            .main-container {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .navbar {
                flex-direction: column;
                align-items: stretch;
            }

            .nav-links {
                justify-content: center;
            }

            .search-box {
                width: 100%;
            }

            .search-box input[type="search"] {
                width: 100%;
            }

            .login-card {
                padding: 28px 22px;
            }

            .dev-avatar {
                width: 80px;
                height: 80px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">

        <!-- ==================== NAVIGATION BAR ==================== -->
        <nav class="navbar">
            <div class="nav-links">
                <a href="#"><i class="fa-solid fa-house"></i> Home</a>
                <a href="#"><i class="fa-solid fa-file-pen"></i> Complaint</a>
                <a href="#"><i class="fa-solid fa-phone"></i> Contact Us</a>
                <a href="#"><i class="fa-solid fa-headset"></i> Customer Care</a>
            </div>
            <div class="search-box">
                <input type="search" placeholder="Search here...">
                <button type="submit"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
            </div>
        </nav>

        <!-- ==================== LOGIN CARD ==================== -->
        <div class="login-card">
            <div class="login-header">
                <div class="icon-circle">
                    <i class="fa-solid fa-right-to-bracket"></i>
                </div>
                <h2>कृपया Login करें</h2>
                <p>अपना Username और Password दर्ज करें</p>
            </div>

            <div class="form-group">
                <label for="username"><i class="fa-solid fa-user"></i> Username</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="username" placeholder="Enter username">
                </div>
            </div>

            <div class="form-group">
                <label for="password"><i class="fa-solid fa-lock"></i> Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="Enter password">
                </div>
            </div>

            <button class="login-btn" type="submit">
                <i class="fa-solid fa-arrow-right-to-bracket"></i> Submit
            </button>

            <div style="text-align:center;font-size:12px;color:var(--text-light)">
                — या —
            </div>

            <div class="social-login">
                <button class="social-btn" title="Google"><i class="fa-brands fa-google"></i></button>
                <button class="social-btn" title="Facebook"><i class="fa-brands fa-facebook-f"></i></button>
                <button class="social-btn" title="Phone"><i class="fa-solid fa-mobile-screen"></i></button>
            </div>
        </div>

        <!-- ==================== INFO CARD ==================== -->
        <div class="info-card">
            <div class="info-notice">
                <i class="fa-solid fa-circle-exclamation"></i> कुछ दिनों में यहाँ Work होगा
            </div>

            <div class="welcome-text">
                <span class="highlight">HELLO GUYS</span><br>
                WELCOME TO YOUR<br>
                <span class="highlight">FAVOURITE PAGE</span><br>
                <span style="font-size:14px;color:var(--text-light)">COMING SOON YOUR DIAMOND 💎</span>
            </div>

            <div class="badge">
                <i class="fa-solid fa-circle-check"></i> Free Service
            </div>

            <div class="dev-section">
                <!-- DEVELOPER -->
                <div class="dev-profile">
                    <div class="dev-avatar rk">R.K.JI</div>
                    <div class="dev-name">R.K. JI</div>
                    <div class="dev-role">👨‍💻 Developer</div>
                </div>

                <!-- PROVIDER -->
                <div class="dev-profile">
                    <div class="dev-avatar dks">SACHIN</div>
                    <div class="dev-name">SACHIN</div>
                    <div class="dev-role">📡 Provider</div>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
